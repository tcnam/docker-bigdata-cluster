# Default system properties included when running spark-submit.
# This is useful for setting default environmental settings.

# Example:
# 1. Cluster Core
spark.master                        yarn
spark.submit.deployMode             cluster
spark.yarn.applicationType          SPARK

# 2. Memory Management (Optimized for Docker)
# In Client mode, the Driver runs in the SparkGateway container
spark.yarn.am.memory             384m
spark.yarn.am.memoryOverhead     128m

spark.driver.memory              896m
spark.driver.memoryOverhead      128m
spark.driver.cores               1

spark.executor.memory            896m
spark.executor.memoryOverhead    128m
spark.executor.cores             1
spark.executor.instances         1

# 3. HDFS & History (Persistence)
spark.eventLog.enabled           true
spark.eventLog.dir               hdfs://namenode:9000/spark/logs
# Note: Use spark.yarn.archive if you zipped the jars, 
# but for a folder of jars, spark.yarn.jars is correct.
spark.yarn.jars                  hdfs://namenode:9000/spark/jars/*

# 4. History Server (The "Reader" Config)
spark.history.provider           org.apache.spark.deploy.history.FsHistoryProvider
spark.history.fs.logDirectory    hdfs://namenode:9000/spark/logs
spark.history.fs.update.interval 10s
spark.yarn.historyServer.address historyserver:18080

# 5. Shuffle Performance (Production addition)
spark.shuffle.service.enabled           true
spark.dynamicAllocation.enabled         true
spark.shuffle.service.port              7337
spark.dynamicAllocation.initialExecutors 1
spark.dynamicAllocation.minExecutors     1
spark.dynamicAllocation.maxExecutors     3

# 6. Port settings
spark.hadoop.hive.server2.thrift.port        10000
spark.hadoop.hive.server2.use.SSL            false
spark.hadoop.hive.server2.thrift.bind.host   0.0.0.0
spark.hadoop.hive.server2.webui.port         10002
spark.ui.port                                4040
spark.sql.thriftServer.ui.retainedSessions   500
spark.sql.catalogImplementation              hive

# 7. Multi-user Fairness (Crucial!)
# Without this, one big query from User A will block User B entirely.
spark.scheduler.mode                    FAIR

# 8. Spark thrift server
# Example entries in spark-defaults.conf
spark.sql.dialect           sql
spark.sql.ansi.enabled      true
spark.sql.catalogImplementation  hive
spark.sql.hive.thriftServer.singleSession  false
spark.sql.warehouse.dir          hdfs:///user/hive/warehouse
# Enable Delta Lake SQL extensions (adds support for MERGE, UPDATE, etc.)
spark.sql.extensions              io.delta.sql.DeltaSparkSessionExtension
# Configure the Catalog to handle Delta-specific table metadata
spark.sql.catalog.spark_catalog   org.apache.spark.sql.delta.catalog.DeltaCatalog

# 9. Spark Connect Server
# Network Binding
spark.connect.grpc.binding.address    0.0.0.0
spark.connect.grpc.binding.port       15002
# Security & Limits
spark.connect.grpc.maxInboundMessageSize    134217728
# (128MB - Increase this if you plan to send large dataframes to the cluster)
# Performance & Stability
spark.connect.execute.reattachable.enabled  true
spark.connect.session.timeout               30min

# 10. Performance Tuning (WSL2 Specific)
# Ensures small shuffle files don't overwhelm the 12-core CPU
spark.sql.shuffle.partitions            18
# Explicitly set GC for executors to match your environment
spark.executor.extraJavaOptions         -XX:+UseG1GC -XX:ParallelGCThreads=1

# spark.executor.extraJavaOptions  -XX:+PrintGCDetails -Dkey=value -Dnumbers="one two three"
