[logging]
    default = FILE:/var/lib/krb5kdc/logs/krb5libs.log
    kdc = FILE:/var/lib/krb5kdc/logs/krb5kdc.log
    admin_server = FILE:/var/lib/krb5kdc/logs/kadmind.log

[libdefaults]
    default_realm = DATAPLATFORM.LOCAL
    dns_lookup_realm = false
    dns_lookup_kdc = false
    ticket_lifetime = 24h
    renew_lifetime = 7d
    forwardable = true
    rdns = false
    # Crucial: Hadoop 3.x on Ubuntu 16.04 prefers these encryption types
    default_tgs_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96
    default_tkt_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96
    permitted_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96

[kdc]
    profile = /etc/krb5kdc/kdc.conf

[realms]
    DATAPLATFORM.LOCAL = {
        kdc = krb5kdc
        admin_server = krb5kdc
    }

[domain_realm]
    .dataplatform.local = DATAPLATFORM.LOCAL
    dataplatform.local = DATAPLATFORM.LOCAL
    # Maps the container hostnames to the realm
    namenode = DATAPLATFORM.LOCAL
    secondarynamenode = DATAPLATFORM.LOCAL
    resourcemanager = DATAPLATFORM.LOCAL
    worker1 = DATAPLATFORM.LOCAL
    worker2 = DATAPLATFORM.LOCAL
    worker3 = DATAPLATFORM.LOCAL
    thriftserver = DATAPLATFORM.LOCAL
    