services:
  namenode:
    image: hadoop_base:1.0
    container_name: namenode
    hostname: namenode
    user: root
    volumes:
      - namenode:/var/data/hadoop
      - config_hadoop:/opt/hadoop/etc/hadoop
      - config_spark:/opt/spark/conf
      - ./conf/krb5/client/krb5.conf:/etc/krb5.conf
      - ./setupScripts/entrypoint_cluster.sh:/entrypoint_cluster.sh
    ports:
      - "9870:9870" # hdfs WebUI
    deploy:
          resources:
            limits:
              memory: 1536M
    entrypoint: ["/entrypoint_cluster.sh", "namenode"]
    networks:
      hadoop_network:
        ipv4_address: ${cluster_namenode_ip}
  
  resourcemanager:
    image: hadoop_base:1.0
    container_name: resourcemanager
    hostname: resourcemanager
    user: root
    volumes:
      - resourcemanager:/var/data/hadoop
      - config_hadoop:/opt/hadoop/etc/hadoop
      - config_spark:/opt/spark/conf
      - ./conf/krb5/client/krb5.conf:/etc/krb5.conf
      - ./setupScripts/entrypoint_cluster.sh:/entrypoint_cluster.sh
    ports:
      - "8088:8088" #Resource Manager WebUI
    deploy:
          resources:
            limits:
              memory: 1536M
    entrypoint: ["/entrypoint_cluster.sh", "resourcemanager"]
    networks:
      hadoop_network:
        ipv4_address: ${cluster_resourcemanager_ip}
  secondarynamenode:
    image: hadoop_base:1.0
    container_name: secondarynamenode
    hostname: secondarynamenode
    user: root
    volumes:
      - secondarynamenode:/var/data/hadoop
      - config_hadoop:/opt/hadoop/etc/hadoop
      - config_spark:/opt/spark/conf
      - ./conf/krb5/client/krb5.conf:/etc/krb5.conf
      - ./setupScripts/entrypoint_cluster.sh:/entrypoint_cluster.sh
    # ports:
    #   - "50090:50090" #secondary namenode metadata service
    deploy:
          resources:
            limits:
              memory: 1024M
    entrypoint: ["/entrypoint_cluster.sh", "secondarynamenode"]
    networks:
      hadoop_network:
        ipv4_address: ${cluster_secondarynamenode_ip}

  worker1:
    image: hadoop_base:1.0
    container_name: worker1
    hostname: worker1
    user: root
    volumes:
      - worker1:/var/data/hadoop
      - config_hadoop:/opt/hadoop/etc/hadoop
      - config_spark:/opt/spark/conf
      - ./conf/krb5/client/krb5.conf:/etc/krb5.conf
      - ./setupScripts/entrypoint_cluster.sh:/entrypoint_cluster.sh
    depends_on:
      - namenode
      - resourcemanager
      - secondarynamenode
    deploy:
          resources:
            limits:
              memory: 2048M
    entrypoint: ["/entrypoint_cluster.sh", "worker"]
    networks:
      hadoop_network:
        ipv4_address: ${cluster_worker1_ip}

  worker2:
    image: hadoop_base:1.0
    container_name: worker2
    hostname: worker2
    user: root
    volumes:
      - worker2:/var/data/hadoop
      - config_hadoop:/opt/hadoop/etc/hadoop
      - config_spark:/opt/spark/conf
      - ./conf/krb5/client/krb5.conf:/etc/krb5.conf
      - ./setupScripts/entrypoint_cluster.sh:/entrypoint_cluster.sh
    depends_on:
      - namenode
      - resourcemanager
      - secondarynamenode
    deploy:
          resources:
            limits:
              memory: 2048M
    entrypoint: ["/entrypoint_cluster.sh", "worker"]
    networks:
      hadoop_network:
        ipv4_address: ${cluster_worker2_ip}

  worker3:
    image: hadoop_base:1.0
    container_name: worker3
    hostname: worker3
    user: root
    volumes:
      - worker3:/var/data/hadoop
      - config_hadoop:/opt/hadoop/etc/hadoop
      - config_spark:/opt/spark/conf
      - ./conf/krb5/client/krb5.conf:/etc/krb5.conf
      - ./setupScripts/entrypoint_cluster.sh:/entrypoint_cluster.sh
    depends_on:
      - namenode
      - resourcemanager
      - secondarynamenode
    deploy:
          resources:
            limits:
              memory: 2048M
    entrypoint: ["/entrypoint_cluster.sh", "worker"]
    networks:
      hadoop_network:
        ipv4_address: ${cluster_worker3_ip}
  
  historyserver:
    image: hadoop_base:1.0
    container_name: historyserver
    hostname: historyserver
    user: root
    ports:
      - "18080:18080" #Spark History Server UI
      - "19888:19888" #Mapreduce History Server UI
    volumes:
      - historyserver:/var/data/hadoop
      - config_hadoop:/opt/hadoop/etc/hadoop
      - config_spark:/opt/spark/conf
      - ./conf/krb5/client/krb5.conf:/etc/krb5.conf
      - ./setupScripts/entrypoint_cluster.sh:/entrypoint_cluster.sh
    depends_on:
      - namenode
      - secondarynamenode
      - resourcemanager
      - worker1
      - worker2
      - worker3
    deploy:
          resources:
            limits:
              memory: 1024M
    entrypoint: ["/entrypoint_cluster.sh", "historyserver"]
    networks:
      hadoop_network:
        ipv4_address: ${cluster_historyserver_ip}

  metastore:
    image: postgres:13-alpine
    container_name: metastore
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - metastore:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
          resources:
            limits:
              memory: 512M
    networks:
      hadoop_network:
        ipv4_address: ${cluster_metastore_ip}

  thriftserver:
    image: hadoop_base:1.0
    container_name: thriftserver
    hostname: thriftserver
    user: hive
    volumes:
      - thriftserver:/var/data/hadoop
      - config_hadoop:/opt/hadoop/etc/hadoop
      - config_spark:/opt/spark/conf
      - config_hive:/opt/hive/conf
      - ./conf/krb5/client/krb5.conf:/etc/krb5.conf
      - ./setupScripts/entrypoint_cluster.sh:/entrypoint_cluster.sh
    depends_on:
      - namenode
      - secondarynamenode
      - resourcemanager
      - worker1
      - worker2
      - worker3
      - historyserver
      - metastore
    ports:
      - "4040:4040"
      - "4041:4041"
      - "15002:15002"
      - "10000:10000"
      - "10002:10002"
    deploy:
          resources:
            limits:
              memory: 2560M
    command: ["/entrypoint_cluster.sh", "thriftserver"]
    networks:
      hadoop_network:
        ipv4_address: ${cluster_thriftserver_ip}

  # edgenode:
  #   image: hadoop_base:1.0
  #   container_name: edgenode
  #   hostname: edgenode
  #   user: spark
  #   volumes:
  #     - config_hadoop:/opt/hadoop/etc/hadoop
  #     - config_spark:/opt/spark/conf 
  #     - workspace:/workspace    
      # - ./conf/krb5/client/krb5.conf:/etc/krb5.conf
      # - ./setupScripts/entrypoint_cluster.sh:/entrypoint_cluster.sh
  #   depends_on:
  #     - namenode
  #     - secondarynamenode
  #     - resourcemanager
  #     - worker1
  #     - worker2
  #     - worker3
  #     - historyserver
  #   ports:
  #     # - "2222:22"
  #     - "4040:4040"
  #   command: ["/entrypoint_cluster.sh", "edgenode"]
  #   networks:
  #     hadoop_network:
  #       ipv4_address: ${cluster_edgenode_ip}
  krb5kdc:
      image: hadoop_base:1.0
      container_name: krb5kdc
      hostname: krb5kdc
      user: root
      volumes:
        - krb5kdc:/var/lib/krb5kdc
        - config_krb5server:/etc/krb5kdc
        - ./setupScripts/entrypoint_cluster.sh:/entrypoint_cluster.sh
      # Kerberos uses Port 88 (UDP/TCP) and 749 for Admin
      ports:
        - "88:88"
        - "749:749"
      deploy:
              resources:
                limits:
                  memory: 256M
      entrypoint: ["/entrypoint_cluster.sh", "krb5kdc"]
      networks:
        hadoop_network:
          ipv4_address: ${cluster_krb5kdc_ip}

volumes:
  namenode:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./services/cluster/namenode
  secondarynamenode:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./services/cluster/secondarynamenode
  resourcemanager:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./services/cluster/resourcemanager
  historyserver:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./services/cluster/historyserver
  worker1:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./services/cluster/worker1
  worker2:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./services/cluster/worker2
  worker3:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./services/cluster/worker3
  metastore:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./services/cluster/metastore
  thriftserver:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./services/cluster/thriftserver
  krb5kdc:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./services/cluster/krb5kdc
  # workspace:
  #   driver: local
  #   driver_opts:
  #     o: bind
  #     type: none
  #     device: ./edge/workspace
  config_hadoop:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./conf/hadoop
  config_spark:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./conf/spark
  config_hive:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./conf/hive
  config_krb5server:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ./conf/krb5/server

networks:
  hadoop_network:
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
        
